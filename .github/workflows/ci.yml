name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ==================== Lint ====================
  # Non-mutating: fails on any formatting drift or lint violation instead of
  # silently fixing it in the ephemeral CI checkout (which never gated
  # anything, since the fix never made it back into the repo).
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.15.20

      - name: ruff format --check
        run: ruff format --check .

      - name: ruff check
        run: ruff check .

  # ==================== Tests: gateway (mocked gRPC, real Redis) ====================
  # gateway mocks gRPC (tests/mocks.py) for all tests, and mocks Redis for most -
  # but test_log_tail.py/test_notifications.py open a real redis.asyncio pub/sub
  # connection directly (MockRedisClient can't reproduce pub/sub semantics), and
  # test_quota_atomicity.py exercises real Redis atomicity under concurrent
  # asyncio.gather. Needs a real Redis service container.
  test-unit:
    name: Test (gateway)
    needs: lint
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # ==================== Tests: analytics (real Postgres, mocked Redis) ====================
  # analytics mocks Redis (unittest.mock.AsyncMock) but tests/conftest.py /
  # tests/db_setup.py always set up real auth_db (port 5432) and logs_db
  # (port 5433) Postgres instances - analytics owns no ORM models of its own
  # and reuses auth_service/ingestion_service's real Base.metadata for table
  # creation. Needs both Postgres instances simultaneously.
  test-analytics:
    name: Test (analytics)
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres-auth:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      postgres-logs:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: services/analytics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/analytics/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # ==================== Tests: real Postgres + Redis ====================
  # auth and query both spin up their own Postgres via tests/db_setup.py
  # (asyncpg, hardcoded to localhost) and a real Redis (tests/test_base.py).
  # auth's tests expect Postgres on 5432 (Auth DB), query's on 5433 (Logs
  # DB) — matching the port layout in docker-compose.yaml / CLAUDE.md.
  test-db:
    name: Test (${{ matrix.service }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            postgres_port: 5432
          - service: query
            postgres_port: 5433
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - ${{ matrix.postgres_port }}:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # ==================== Tests: real Postgres + Redis + RabbitMQ ====================
  # ingestion is the only service whose tests also drive a real RabbitMQ
  # broker (tests/test_base.py connects via aio_pika.connect_robust and
  # declares the real topology), on top of Postgres (Logs DB, port 5433)
  # and Redis. Kept as its own job so auth/query don't pay for a broker
  # they never touch.
  test-ingestion:
    name: Test (ingestion)
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: ledger
          RABBITMQ_DEFAULT_PASS: ledger
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=5
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # ==================== Docker build sanity check ====================
  # Build-only (no push, no registry credentials in CI). Mirrors the build
  # invocation used by scripts/Makefile's prod-deploy target.
  docker-build:
    name: Docker build (${{ matrix.service }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, gateway, ingestion, analytics, query]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --file services/${{ matrix.service }}/Dockerfile \
            --tag ledger-${{ matrix.service }}:ci \
            services/${{ matrix.service }}
