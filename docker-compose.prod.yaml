services:
  ledger-postgres:
    image: postgres:15-alpine
    container_name: ledger-postgres
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c checkpoint_completion_target=0.9
      -c max_connections=30
    volumes:
      - ledger-postgres-data:/var/lib/postgresql/data
      - ../LedgerServer/database_schema/init_auth_db.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER}"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - ledger-server-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-postgres-logs:
    image: postgres:15-alpine
    container_name: ledger-postgres-logs
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      POSTGRES_DB: ${LOGS_DB_NAME}
      POSTGRES_USER: ${LOGS_DB_USER}
      POSTGRES_PASSWORD: ${LOGS_DB_PASSWORD}
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=512MB
      -c checkpoint_completion_target=0.9
      -c max_wal_size=1GB
      -c autovacuum_max_workers=2
      -c max_connections=30
    volumes:
      - ledger-postgres-logs-data:/var/lib/postgresql/data
      - ../LedgerServer/database_schema/init_logs_db.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.1"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOGS_DB_USER}"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - ledger-server-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-redis:
    image: redis:7-alpine
    container_name: ledger-redis
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    volumes:
      - ledger-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - ledger-server-network
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode no
      --save 300 10
      --save 900 1
      --tcp-keepalive 300
      --timeout 300
      --maxclients 50
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-auth-service:
    image: container-repository.jtuta.cloud/ledger/auth:latest
    container_name: ledger-auth-service
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      AUTH_DB_HOST: ledger-postgres
      REDIS_HOST: ledger-redis
    depends_on:
      ledger-postgres:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.05"
          memory: 96M
    networks:
      - ledger-server-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import grpc; channel = grpc.insecure_channel('localhost:50051'); channel.close()",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-gateway:
    image: container-repository.jtuta.cloud/ledger/gateway:latest
    container_name: ledger-gateway
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      REDIS_HOST: ledger-redis
      AUTH_SERVICE_HOST: ledger-auth-service
      INGESTION_SERVICE_HOST: ledger-ingestion
      QUERY_SERVICE_HOST: ledger-query
    depends_on:
      ledger-auth-service:
        condition: service_healthy
      ledger-ingestion:
        condition: service_healthy
      ledger-query:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GATEWAY_HTTP_PORT}:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.15"
          memory: 192M
    networks:
      - ledger-server-network
    command: >
      uvicorn gateway_service.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${GATEWAY_WORKERS}
      --log-level info
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-ingestion:
    image: container-repository.jtuta.cloud/ledger/ingestion:latest
    container_name: ledger-ingestion
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      REDIS_HOST: ledger-redis
      LOGS_DB_HOST: ledger-postgres-logs
    depends_on:
      ledger-postgres-logs:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.05"
          memory: 96M
    networks:
      - ledger-server-network
    command: python -m ingestion_service.main
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import grpc; channel = grpc.insecure_channel('localhost:50052'); channel.close()",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-ingestion-worker:
    image: container-repository.jtuta.cloud/ledger/ingestion:latest
    container_name: ledger-ingestion-worker
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      REDIS_HOST: ledger-redis
      LOGS_DB_HOST: ledger-postgres-logs
    depends_on:
      ledger-postgres-logs:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
      ledger-ingestion:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.05"
          memory: 64M
    networks:
      - ledger-server-network
    command: python -m ingestion_service.worker
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-analytics-workers:
    image: container-repository.jtuta.cloud/ledger/analytics:latest
    container_name: ledger-analytics-workers
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      REDIS_HOST: ledger-redis
      LOGS_DB_HOST: ledger-postgres-logs
      AUTH_DB_HOST: ledger-postgres
    depends_on:
      ledger-postgres:
        condition: service_healthy
      ledger-postgres-logs:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.05"
          memory: 96M
    networks:
      - ledger-server-network
    command: python -m analytics_workers.main
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ledger-query:
    image: container-repository.jtuta.cloud/ledger/query:latest
    container_name: ledger-query
    restart: unless-stopped
    env_file: ../secrets/.env.ledger
    environment:
      REDIS_HOST: ledger-redis
      LOGS_DB_HOST: ledger-postgres-logs
    depends_on:
      ledger-postgres-logs:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.05"
          memory: 96M
    networks:
      - ledger-server-network
    command: python -m query_service.main
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import grpc; channel = grpc.insecure_channel('localhost:${QUERY_GRPC_PORT:-50053}'); channel.close()",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  ledger-postgres-data:
    name: ledger-postgres-data
  ledger-postgres-logs-data:
    name: ledger-postgres-logs-data
  ledger-redis-data:
    name: ledger-redis-data

networks:
  ledger-server-network:
    driver: bridge
  ledger-frontend-network:
    driver: bridge
