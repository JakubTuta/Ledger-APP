syntax = "proto3";

package auth;

service AuthService {
  // Account operations
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc UpdateAccountName(UpdateAccountNameRequest) returns (UpdateAccountNameResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc GetNotificationPreferences(GetNotificationPreferencesRequest) returns (GetNotificationPreferencesResponse);
  rpc UpdateNotificationPreferences(UpdateNotificationPreferencesRequest) returns (UpdateNotificationPreferencesResponse);

  // Email verification
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc ResendVerificationEmail(ResendVerificationEmailRequest) returns (ResendVerificationEmailResponse);

  // TOTP two-factor authentication
  rpc Setup2FA(Setup2FARequest) returns (Setup2FAResponse);
  rpc Verify2FASetup(Verify2FASetupRequest) returns (Verify2FASetupResponse);
  rpc Disable2FA(Disable2FARequest) returns (Disable2FAResponse);
  rpc VerifyTOTPLogin(VerifyTOTPLoginRequest) returns (VerifyTOTPLoginResponse);

  // Session management (refresh token sessions)
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  rpc RevokeAllSessions(RevokeAllSessionsRequest) returns (RevokeAllSessionsResponse);

  // Project operations
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc GetProjects(GetProjectsRequest) returns (GetProjectsResponse);
  rpc GetProjectById(GetProjectByIdRequest) returns (GetProjectByIdResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);

  // Project sharing operations
  rpc GenerateInviteCode(GenerateInviteCodeRequest) returns (GenerateInviteCodeResponse);
  rpc AcceptInviteCode(AcceptInviteCodeRequest) returns (AcceptInviteCodeResponse);
  rpc ListProjectMembers(ListProjectMembersRequest) returns (ListProjectMembersResponse);
  rpc RemoveProjectMember(RemoveProjectMemberRequest) returns (RemoveProjectMemberResponse);
  rpc LeaveProject(LeaveProjectRequest) returns (LeaveProjectResponse);
  rpc GetProjectRole(GetProjectRoleRequest) returns (GetProjectRoleResponse);

  // API key operations
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse);
  rpc ValidateApiKey(ValidateApiKeyRequest) returns (ValidateApiKeyResponse);
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse);
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse);

  // Usage tracking operations
  rpc GetDailyUsage(GetDailyUsageRequest) returns (GetDailyUsageResponse);

  // Dashboard panel operations
  rpc GetDashboardPanels(GetDashboardPanelsRequest) returns (GetDashboardPanelsResponse);
  rpc CreateDashboardPanel(CreateDashboardPanelRequest) returns (CreateDashboardPanelResponse);
  rpc UpdateDashboardPanel(UpdateDashboardPanelRequest) returns (UpdateDashboardPanelResponse);
  rpc DeleteDashboardPanel(DeleteDashboardPanelRequest) returns (DeleteDashboardPanelResponse);

  // Dashboard tab operations
  rpc GetDashboardTabs(GetDashboardTabsRequest) returns (GetDashboardTabsResponse);
  rpc SaveDashboardTabs(SaveDashboardTabsRequest) returns (SaveDashboardTabsResponse);

  // Notification inbox operations
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc GetUnreadNotificationCount(GetUnreadNotificationCountRequest) returns (GetUnreadNotificationCountResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse);
  rpc MarkAllNotificationsRead(MarkAllNotificationsReadRequest) returns (MarkAllNotificationsReadResponse);
  rpc DeleteNotification(DeleteNotificationRequest) returns (DeleteNotificationResponse);
  rpc CreateNotification(CreateNotificationRequest) returns (CreateNotificationResponse);

  // Alert rule operations
  rpc ListAlertRules(ListAlertRulesRequest) returns (ListAlertRulesResponse);
  rpc GetAlertRule(GetAlertRuleRequest) returns (GetAlertRuleResponse);
  rpc CreateAlertRule(CreateAlertRuleRequest) returns (CreateAlertRuleResponse);
  rpc UpdateAlertRule(UpdateAlertRuleRequest) returns (UpdateAlertRuleResponse);
  rpc DeleteAlertRule(DeleteAlertRuleRequest) returns (DeleteAlertRuleResponse);

  // Connector operations (account-wide)
  rpc ListConnectors(ListConnectorsRequest) returns (ListConnectorsResponse);
  rpc GetConnector(GetConnectorRequest) returns (GetConnectorResponse);
  rpc CreateConnector(CreateConnectorRequest) returns (CreateConnectorResponse);
  rpc UpdateConnector(UpdateConnectorRequest) returns (UpdateConnectorResponse);
  rpc DeleteConnector(DeleteConnectorRequest) returns (DeleteConnectorResponse);

  // Alert event history
  rpc ListAlertEvents(ListAlertEventsRequest) returns (ListAlertEventsResponse);
  rpc AckAlertEvent(AckAlertEventRequest) returns (AckAlertEventResponse);
  rpc SnoozeAlertEvent(SnoozeAlertEventRequest) returns (SnoozeAlertEventResponse);

  // Notification preferences (alert-specific)
  rpc GetAlertNotificationPreferences(GetAlertNotificationPreferencesRequest) returns (GetAlertNotificationPreferencesResponse);
  rpc UpsertAlertNotificationPreference(UpsertAlertNotificationPreferenceRequest) returns (UpsertAlertNotificationPreferenceResponse);

  // Monitor operations (uptime / heartbeat)
  rpc CreateMonitor(CreateMonitorRequest) returns (CreateMonitorResponse);
  rpc ListMonitors(ListMonitorsRequest) returns (ListMonitorsResponse);
  rpc UpdateMonitor(UpdateMonitorRequest) returns (UpdateMonitorResponse);
  rpc DeleteMonitor(DeleteMonitorRequest) returns (DeleteMonitorResponse);
  rpc GetMonitorByToken(GetMonitorByTokenRequest) returns (GetMonitorByTokenResponse);
  rpc RecordHeartbeatPing(RecordHeartbeatPingRequest) returns (RecordHeartbeatPingResponse);

  // Maintenance window operations
  rpc ListMaintenanceWindows(ListMaintenanceWindowsRequest) returns (ListMaintenanceWindowsResponse);
  rpc CreateMaintenanceWindow(CreateMaintenanceWindowRequest) returns (CreateMaintenanceWindowResponse);
  rpc DeleteMaintenanceWindow(DeleteMaintenanceWindowRequest) returns (DeleteMaintenanceWindowResponse);
}

// ==================== Account Messages ====================

message RegisterRequest {
  string email = 1;
  string password = 2;
  string plan = 3;
}

message RegisterResponse {
  int64 account_id = 1;
  string email = 2;
  string plan = 3;
  string name = 4;
  // Raw (unhashed) email verification token, generated at registration time.
  // Only ever returned here so the caller (gateway) can email it; never
  // persisted anywhere except its hash-equivalent column in the DB.
  string email_verification_token = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  int64 account_id = 1;
  string email = 2;
  string plan = 3;
  string access_token = 4;
  string refresh_token = 5;
  int32 expires_in = 6;
  // When true, the account has TOTP 2FA enabled: password was correct but
  // access_token/refresh_token are intentionally empty. The caller must
  // complete login via VerifyTOTPLogin using a totp_session_token it
  // creates/tracks itself (gateway-side, in Redis).
  bool requires_2fa = 7;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;
  int64 account_id = 4;
  string email = 5;
}

message GetAccountRequest {
  int64 account_id = 1;
}

message GetAccountResponse {
  int64 account_id = 1;
  string email = 2;
  string plan = 3;
  string status = 4;
  string name = 5;
  string created_at = 6;
  bool email_verified = 7;
  bool totp_enabled = 8;
}

message UpdateAccountNameRequest {
  int64 account_id = 1;
  string name = 2;
}

message UpdateAccountNameResponse {
  bool success = 1;
  string name = 2;
}

message ChangePasswordRequest {
  int64 account_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message ChangePasswordResponse {
  bool success = 1;
}

message GetNotificationPreferencesRequest {
  int64 account_id = 1;
}

message NotificationPreferences {
  bool enabled = 1;
  map<int64, ProjectNotificationSettings> projects = 2;
}

message ProjectNotificationSettings {
  bool enabled = 1;
  repeated string levels = 2;
  repeated string types = 3;
}

message GetNotificationPreferencesResponse {
  NotificationPreferences preferences = 1;
}

message UpdateNotificationPreferencesRequest {
  int64 account_id = 1;
  NotificationPreferences preferences = 2;
}

message UpdateNotificationPreferencesResponse {
  bool success = 1;
  NotificationPreferences preferences = 2;
}

// ==================== Email Verification Messages ====================

message VerifyEmailRequest {
  string token = 1;
}

message VerifyEmailResponse {
  bool success = 1;
  string error_message = 2;
}

message ResendVerificationEmailRequest {
  int64 account_id = 1;
}

message ResendVerificationEmailResponse {
  bool success = 1;
  bool already_verified = 2;
  string email = 3;
  // Raw verification token; caller (gateway) emails it, never displays it.
  string verification_token = 4;
  string error_message = 5;
}

// ==================== TOTP 2FA Messages ====================

message Setup2FARequest {
  int64 account_id = 1;
}

message Setup2FAResponse {
  string secret = 1;
  string provisioning_uri = 2;
}

message Verify2FASetupRequest {
  int64 account_id = 1;
  string code = 2;
}

message Verify2FASetupResponse {
  bool success = 1;
  // Plaintext one-time backup codes — returned exactly once, on successful
  // setup verification. Only their SHA-256 hashes are ever persisted.
  repeated string backup_codes = 2;
  string error_message = 3;
}

message Disable2FARequest {
  int64 account_id = 1;
  string password = 2;
}

message Disable2FAResponse {
  bool success = 1;
  string error_message = 2;
}

message VerifyTOTPLoginRequest {
  int64 account_id = 1;
  string code = 2;
  string device_info = 3;
}

message VerifyTOTPLoginResponse {
  bool success = 1;
  string access_token = 2;
  string refresh_token = 3;
  int32 expires_in = 4;
  int64 account_id = 5;
  string email = 6;
  string error_message = 7;
}

// ==================== Session Management Messages ====================

message SessionInfo {
  int64 id = 1;
  optional string device_info = 2;
  string created_at = 3;
  optional string last_used_at = 4;
  string expires_at = 5;
  bool is_current = 6;
}

message ListSessionsRequest {
  int64 account_id = 1;
  // Raw refresh token of the session making this request, used only to
  // determine which returned session is "current". Optional — if empty,
  // is_current is always false.
  optional string current_refresh_token = 2;
}

message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message RevokeSessionRequest {
  int64 account_id = 1;
  int64 session_id = 2;
}

message RevokeSessionResponse {
  bool success = 1;
  string error_message = 2;
}

message RevokeAllSessionsRequest {
  int64 account_id = 1;
  optional string current_refresh_token = 2;
  bool include_current = 3;
}

message RevokeAllSessionsResponse {
  int32 revoked_count = 1;
}

// ==================== Project Messages ====================

message CreateProjectRequest {
  int64 account_id = 1;
  string name = 2;
  string slug = 3;
  string environment = 4;
}

message CreateProjectResponse {
  int64 project_id = 1;
  string name = 2;
  string slug = 3;
  string environment = 4;
  int32 retention_days = 5;
  int64 daily_quota = 6;
}

message GetProjectsRequest {
  int64 account_id = 1;
}

message ProjectInfo {
  int64 project_id = 1;
  string name = 2;
  string slug = 3;
  string environment = 4;
  int32 retention_days = 5;
  int64 daily_quota = 6;
  repeated string available_routes = 7;
  string role = 8;
}

message GetProjectsResponse {
  repeated ProjectInfo projects = 1;
}

message GetProjectByIdRequest {
  int64 project_id = 1;
}

message GetProjectByIdResponse {
  int64 project_id = 1;
  string name = 2;
  string slug = 3;
  string environment = 4;
  int32 retention_days = 5;
  int64 daily_quota = 6;
  repeated string available_routes = 7;
}

message UpdateProjectRequest {
  int64 project_id = 1;
  int64 requester_account_id = 2;
  optional int32 retention_days = 3;
  optional int64 daily_quota = 4;
}

message UpdateProjectResponse {
  int64 project_id = 1;
  string name = 2;
  string slug = 3;
  string environment = 4;
  int32 retention_days = 5;
  int64 daily_quota = 6;
}

// ==================== Project Sharing Messages ====================

message GenerateInviteCodeRequest {
  int64 project_id = 1;
  int64 requester_account_id = 2;
}

message GenerateInviteCodeResponse {
  string code = 1;
  string expires_at = 2;
}

message AcceptInviteCodeRequest {
  string code = 1;
  int64 account_id = 2;
}

message AcceptInviteCodeResponse {
  int64 project_id = 1;
  string role = 2;
  string project_name = 3;
  string project_slug = 4;
}

message MemberInfo {
  int64 account_id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
  string joined_at = 5;
}

message ListProjectMembersRequest {
  int64 project_id = 1;
  int64 requester_account_id = 2;
}

message ListProjectMembersResponse {
  repeated MemberInfo members = 1;
}

message RemoveProjectMemberRequest {
  int64 project_id = 1;
  int64 account_id = 2;
  int64 requester_account_id = 3;
}

message RemoveProjectMemberResponse {
  bool success = 1;
}

message LeaveProjectRequest {
  int64 project_id = 1;
  int64 account_id = 2;
}

message LeaveProjectResponse {
  bool success = 1;
}

message GetProjectRoleRequest {
  int64 project_id = 1;
  int64 account_id = 2;
}

message GetProjectRoleResponse {
  bool is_member = 1;
  string role = 2;
}

// ==================== Usage Tracking Messages ====================

message GetDailyUsageRequest {
  int64 project_id = 1;
  string date = 2;
}

message GetDailyUsageResponse {
  int64 log_count = 1;
  string date = 2;
}

// ==================== API Key Messages ====================

message CreateApiKeyRequest {
  int64 project_id = 1;
  string name = 2;
}

message CreateApiKeyResponse {
  int64 key_id = 1;
  string full_key = 2;  // Only returned once!
  string key_prefix = 3;
}

message ValidateApiKeyRequest {
  string api_key = 1;
}

message ValidateApiKeyResponse {
  bool valid = 1;
  int64 project_id = 2;
  int64 account_id = 3;
  int64 daily_quota = 4;
  int32 retention_days = 5;
  int32 rate_limit_per_minute = 6;
  int32 rate_limit_per_hour = 7;
  int64 current_usage = 8;
  string error_message = 9;
}

message RevokeApiKeyRequest {
  int64 key_id = 1;
  // Requesting account, used to enforce that only the owning project's
  // owner may revoke a key (see AuthService.revoke_api_key).
  int64 requester_account_id = 2;
}

message RevokeApiKeyResponse {
  bool success = 1;
}

message ListApiKeysRequest {
  int64 project_id = 1;
}

message ApiKeyInfo {
  int64 key_id = 1;
  int64 project_id = 2;
  string name = 3;
  string key_prefix = 4;
  string status = 5;
  string created_at = 6;
  string last_used_at = 7;
}

message ListApiKeysResponse {
  repeated ApiKeyInfo api_keys = 1;
}

// ==================== Dashboard Panel Messages ====================

message PanelLayout {
  int32 x = 1;
  int32 y = 2;
  int32 w = 3;
  int32 h = 4;
}

message Panel {
  string id = 1;
  string name = 2;
  int32 index = 3;
  string project_id = 4;
  optional string period = 5;
  optional string periodFrom = 6;
  optional string periodTo = 7;
  string type = 8;
  string endpoint = 9;
  repeated string routes = 10;
  string statistic = 11;
  optional PanelLayout layout = 12;
  // trace panel fields
  optional string trace_id = 13;
  optional string service_filter = 14;
  optional string operation_filter = 15;
  optional int32 min_duration_ms = 16;
  optional bool has_error = 17;
  optional int32 limit = 18;
  // logs panel filter fields
  optional string status_class = 24;
  optional string logs_search = 25;
}

message GetDashboardPanelsRequest {
  int64 user_id = 1;
}

message GetDashboardPanelsResponse {
  repeated Panel panels = 1;
}

message CreateDashboardPanelRequest {
  int64 user_id = 1;
  string name = 2;
  int32 index = 3;
  string project_id = 4;
  optional string period = 5;
  optional string periodFrom = 6;
  optional string periodTo = 7;
  string type = 8;
  string endpoint = 9;
  repeated string routes = 10;
  string statistic = 11;
  optional PanelLayout layout = 12;
  optional string trace_id = 13;
  optional string service_filter = 14;
  optional string operation_filter = 15;
  optional int32 min_duration_ms = 16;
  optional bool has_error = 17;
  optional int32 limit = 18;
  optional string status_class = 24;
  optional string logs_search = 25;
}

message CreateDashboardPanelResponse {
  Panel panel = 1;
}

message UpdateDashboardPanelRequest {
  int64 user_id = 1;
  string panel_id = 2;
  string name = 3;
  int32 index = 4;
  string project_id = 5;
  optional string period = 6;
  optional string periodFrom = 7;
  optional string periodTo = 8;
  string type = 9;
  string endpoint = 10;
  repeated string routes = 11;
  string statistic = 12;
  optional PanelLayout layout = 13;
  optional string trace_id = 14;
  optional string service_filter = 15;
  optional string operation_filter = 16;
  optional int32 min_duration_ms = 17;
  optional bool has_error = 18;
  optional int32 limit = 19;
  optional string status_class = 25;
  optional string logs_search = 26;
}

message UpdateDashboardPanelResponse {
  Panel panel = 1;
}

message DeleteDashboardPanelRequest {
  int64 user_id = 1;
  string panel_id = 2;
}

message DeleteDashboardPanelResponse {
  bool success = 1;
}

// ==================== Dashboard Tab Messages ====================

message DashboardTab {
  string id = 1;
  string name = 2;
  optional string template_id = 3;
  repeated string panel_ids = 4;
  optional string project_id = 5;
}

message GetDashboardTabsRequest {
  int64 user_id = 1;
}

message GetDashboardTabsResponse {
  repeated DashboardTab tabs = 1;
  optional string active_tab_id = 2;
}

message SaveDashboardTabsRequest {
  int64 user_id = 1;
  repeated DashboardTab tabs = 2;
  optional string active_tab_id = 3;
}

message SaveDashboardTabsResponse {
  bool success = 1;
}

// ==================== Notification Inbox Messages ====================

message NotificationItem {
  int64 id = 1;
  int64 user_id = 2;
  int64 project_id = 3;
  string kind = 4;
  int32 severity = 5;
  string payload = 6;  // JSON string
  string created_at = 7;
  optional string read_at = 8;
  string expires_at = 9;
}

message ListNotificationsRequest {
  int64 user_id = 1;
  optional bool unread_only = 2;
  optional int32 limit = 3;
  optional int64 before_id = 4;
}

message ListNotificationsResponse {
  repeated NotificationItem notifications = 1;
  bool has_more = 2;
}

message GetUnreadNotificationCountRequest {
  int64 user_id = 1;
}

message GetUnreadNotificationCountResponse {
  int64 count = 1;
}

message MarkNotificationReadRequest {
  int64 notification_id = 1;
  int64 user_id = 2;
}

message MarkNotificationReadResponse {
  bool success = 1;
}

message MarkAllNotificationsReadRequest {
  int64 user_id = 1;
}

message MarkAllNotificationsReadResponse {
  int64 updated_count = 1;
}

message DeleteNotificationRequest {
  int64 notification_id = 1;
  int64 user_id = 2;
}

message DeleteNotificationResponse {
  bool success = 1;
}

message CreateNotificationRequest {
  int64 user_id = 1;
  int64 project_id = 2;
  string kind = 3;
  int32 severity = 4;
  string payload = 5;  // JSON string
}

message CreateNotificationResponse {
  NotificationItem notification = 1;
}

// ==================== Alert Rule Messages ====================

message AlertRule {
  int64 id = 1;
  int64 project_id = 2;
  string name = 3;
  bool enabled = 4;
  string metric = 5;
  string comparator = 7;
  double threshold = 8;
  string unit = 9;
  int32 severity = 11;
  repeated int64 connector_ids = 12;
  optional string last_fired_at = 13;
  string created_at = 15;
  string updated_at = 16;
  optional int32 escalation_after_minutes = 17;
  optional int64 escalate_connector_id = 18;
}

message ListAlertRulesRequest {
  int64 project_id = 1;
}

message ListAlertRulesResponse {
  repeated AlertRule rules = 1;
}

message GetAlertRuleRequest {
  int64 rule_id = 1;
  int64 project_id = 2;
}

message GetAlertRuleResponse {
  AlertRule rule = 1;
  bool found = 2;
}

message CreateAlertRuleRequest {
  int64 project_id = 1;
  string name = 2;
  string metric = 3;
  string comparator = 5;
  double threshold = 6;
  string unit = 7;
  int32 severity = 9;
  repeated int64 connector_ids = 10;
  optional int32 escalation_after_minutes = 11;
  optional int64 escalate_connector_id = 12;
}

message CreateAlertRuleResponse {
  AlertRule rule = 1;
}

message UpdateAlertRuleRequest {
  int64 rule_id = 1;
  int64 project_id = 2;
  optional string name = 3;
  optional bool enabled = 4;
  optional double threshold = 5;
  optional string unit = 6;
  optional int32 severity = 7;
  optional string comparator = 8;
  optional string metric = 9;
  repeated int64 connector_ids = 10;
  optional bool update_connectors = 11;
  optional int32 escalation_after_minutes = 12;
  optional int64 escalate_connector_id = 13;
  optional bool clear_escalate_connector_id = 14;
}

message UpdateAlertRuleResponse {
  AlertRule rule = 1;
}

message DeleteAlertRuleRequest {
  int64 rule_id = 1;
  int64 project_id = 2;
}

message DeleteAlertRuleResponse {
  bool success = 1;
}

// ==================== Connector Messages ====================

message Connector {
  int64 id = 1;
  int64 account_id = 2;
  string kind = 3;
  string name = 4;
  string config = 5;  // JSON string (without hmac_secret in responses)
  bool enabled = 6;
  string created_at = 7;
}

message ListConnectorsRequest {
  int64 account_id = 1;
}

message ListConnectorsResponse {
  repeated Connector connectors = 1;
}

message GetConnectorRequest {
  int64 connector_id = 1;
  int64 account_id = 2;
}

message GetConnectorResponse {
  Connector connector = 1;
  bool found = 2;
}

message CreateConnectorRequest {
  int64 account_id = 1;
  string kind = 2;
  string name = 3;
  string config = 4;  // JSON string
}

message CreateConnectorResponse {
  Connector connector = 1;
}

message UpdateConnectorRequest {
  int64 connector_id = 1;
  int64 account_id = 2;
  optional string name = 3;
  optional bool enabled = 4;
  optional string config = 5;  // JSON string
}

message UpdateConnectorResponse {
  Connector connector = 1;
}

message DeleteConnectorRequest {
  int64 connector_id = 1;
  int64 account_id = 2;
}

message DeleteConnectorResponse {
  bool success = 1;
}

// ==================== Alert Event Messages ====================

message AlertEvent {
  int64 id = 1;
  optional int64 rule_id = 2;
  int64 project_id = 3;
  string rule_name = 4;
  string metric = 5;
  string comparator = 6;
  double threshold = 7;
  string unit = 8;
  double value = 9;
  int32 severity = 10;
  string connectors_sent = 12;  // JSON array of {id,kind,name}
  string fired_at = 13;
  optional int64 acked_by = 14;
  optional string acked_at = 15;
  optional string snoozed_until = 16;
}

message ListAlertEventsRequest {
  int64 project_id = 1;
  int32 limit = 2;
  optional int64 before_id = 3;
}

message ListAlertEventsResponse {
  repeated AlertEvent events = 1;
  bool has_more = 2;
}

message AckAlertEventRequest {
  int64 event_id = 1;
  int64 project_id = 2;
  int64 account_id = 3;
}

message AckAlertEventResponse {
  bool success = 1;
  string error_message = 2;
  AlertEvent event = 3;
}

message SnoozeAlertEventRequest {
  int64 event_id = 1;
  int64 project_id = 2;
  int32 minutes = 3;
}

message SnoozeAlertEventResponse {
  bool success = 1;
  string error_message = 2;
  AlertEvent event = 3;
}

// ==================== Alert Notification Preferences Messages ====================

message AlertNotificationPreference {
  int64 user_id = 1;
  int64 project_id = 2;
  optional int64 rule_id = 3;
  optional int32 severity = 4;
  bool muted = 5;
  optional string channels = 6;  // JSON array
}

message GetAlertNotificationPreferencesRequest {
  int64 user_id = 1;
  int64 project_id = 2;
}

message GetAlertNotificationPreferencesResponse {
  repeated AlertNotificationPreference preferences = 1;
}

message UpsertAlertNotificationPreferenceRequest {
  int64 user_id = 1;
  int64 project_id = 2;
  optional int64 rule_id = 3;
  optional int32 severity = 4;
  bool muted = 5;
  optional string channels = 6;  // JSON array
}

message UpsertAlertNotificationPreferenceResponse {
  AlertNotificationPreference preference = 1;
}

// ==================== Monitor Messages ====================

message Monitor {
  int64 id = 1;
  int64 project_id = 2;
  string kind = 3;               // 'http' | 'heartbeat'
  string name = 4;
  optional string target_url = 5;
  optional string token = 6;     // heartbeat only
  int32 interval_s = 7;
  int32 timeout_s = 8;
  int32 expected_status = 9;
  int32 grace_s = 10;
  bool enabled = 11;
  string state = 12;             // 'unknown' | 'up' | 'down'
  string created_at = 13;
  string updated_at = 14;
  // computed status fields (populated on List)
  optional string last_checked_at = 15;
  optional bool last_ok = 16;
  optional int32 last_latency_ms = 17;
  double uptime_pct_24h = 18;
}

message CreateMonitorRequest {
  int64 project_id = 1;
  string kind = 2;
  string name = 3;
  optional string target_url = 4;
  int32 interval_s = 5;
  int32 timeout_s = 6;
  int32 expected_status = 7;
  int32 grace_s = 8;
}

message CreateMonitorResponse {
  Monitor monitor = 1;
}

message ListMonitorsRequest {
  int64 project_id = 1;
}

message ListMonitorsResponse {
  repeated Monitor monitors = 1;
}

message UpdateMonitorRequest {
  int64 monitor_id = 1;
  int64 project_id = 2;
  optional string name = 3;
  optional string target_url = 4;
  optional int32 interval_s = 5;
  optional int32 timeout_s = 6;
  optional int32 expected_status = 7;
  optional int32 grace_s = 8;
  optional bool enabled = 9;
}

message UpdateMonitorResponse {
  Monitor monitor = 1;
}

message DeleteMonitorRequest {
  int64 monitor_id = 1;
  int64 project_id = 2;
}

message DeleteMonitorResponse {
  bool success = 1;
}

message GetMonitorByTokenRequest {
  string token = 1;
}

message GetMonitorByTokenResponse {
  bool found = 1;
  Monitor monitor = 2;
}

message RecordHeartbeatPingRequest {
  string token = 1;
}

message RecordHeartbeatPingResponse {
  bool success = 1;
  string error_message = 2;
}

// ==================== Maintenance Window Messages ====================

message MaintenanceWindow {
  int64 id = 1;
  int64 project_id = 2;
  string name = 3;
  string starts_at = 4;
  string ends_at = 5;
  optional string recurrence = 6;  // 'none' | 'daily' | 'weekly'
  string created_at = 7;
  string updated_at = 8;
}

message ListMaintenanceWindowsRequest {
  int64 project_id = 1;
}

message ListMaintenanceWindowsResponse {
  repeated MaintenanceWindow windows = 1;
}

message CreateMaintenanceWindowRequest {
  int64 project_id = 1;
  string name = 2;
  string starts_at = 3;
  string ends_at = 4;
  optional string recurrence = 5;
}

message CreateMaintenanceWindowResponse {
  MaintenanceWindow window = 1;
}

message DeleteMaintenanceWindowRequest {
  int64 window_id = 1;
  int64 project_id = 2;
}

message DeleteMaintenanceWindowResponse {
  bool success = 1;
}