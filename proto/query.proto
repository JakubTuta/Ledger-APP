syntax = "proto3";

package query;

service QueryService {
    rpc QueryLogs(QueryLogsRequest) returns (QueryLogsResponse);
    rpc GetLogFacets(GetLogFacetsRequest) returns (GetLogFacetsResponse);
    rpc SearchLogs(SearchLogsRequest) returns (SearchLogsResponse);
    rpc GetLog(GetLogRequest) returns (GetLogResponse);
    rpc GetErrorRate(GetErrorRateRequest) returns (GetErrorRateResponse);
    rpc GetLogVolume(GetLogVolumeRequest) returns (GetLogVolumeResponse);
    rpc GetTopErrors(GetTopErrorsRequest) returns (GetTopErrorsResponse);
    rpc GetUsageStats(GetUsageStatsRequest) returns (GetUsageStatsResponse);
    rpc GetAggregatedMetrics(GetAggregatedMetricsRequest) returns (GetAggregatedMetricsResponse);
    rpc GetErrorList(GetErrorListRequest) returns (GetErrorListResponse);
    rpc GetBottleneckMetrics(GetBottleneckMetricsRequest) returns (GetBottleneckMetricsResponse);
    rpc GetBottleneckList(GetBottleneckListRequest) returns (GetBottleneckListResponse);
    rpc GetHealthSummary(GetHealthSummaryRequest) returns (GetHealthSummaryResponse);

    // Error group workflow (resolve/ignore/mute/reopen, assignment)
    rpc ListErrorGroups(ListErrorGroupsRequest) returns (ListErrorGroupsResponse);
    rpc GetErrorGroup(GetErrorGroupRequest) returns (GetErrorGroupResponse);
    rpc UpdateErrorGroupStatus(UpdateErrorGroupStatusRequest) returns (UpdateErrorGroupStatusResponse);
    rpc AssignErrorGroup(AssignErrorGroupRequest) returns (AssignErrorGroupResponse);

    // Distributed tracing
    rpc GetTrace(GetTraceRequest) returns (GetTraceResponse);
    rpc ListTraces(ListTracesRequest) returns (ListTracesResponse);
    rpc GetSpanLatency(GetSpanLatencyRequest) returns (GetSpanLatencyResponse);

    // Metric points
    rpc GetMetricSeries(GetMetricSeriesRequest) returns (GetMetricSeriesResponse);
    rpc QueryMetrics(QueryMetricsRequest) returns (QueryMetricsResponse);
}

message QueryLogsRequest {
    int64 project_id = 1;
    optional string start_time = 2;
    optional string end_time = 3;
    optional string level = 4;
    optional string log_type = 5;
    optional string environment = 6;
    optional string error_fingerprint = 7;
    int32 limit = 8;
    int32 offset = 9;
    repeated string status_class = 10;  // "2xx", "4xx", "5xx"
    optional string search = 11;        // substring match on method, path, message, or error_message
    optional string cursor = 12;        // keyset cursor from a prior response's next_cursor; takes precedence over offset
}

message GetLogFacetsRequest {
    int64 project_id = 1;
    optional string start_time = 2;
    optional string end_time = 3;
    optional string level = 4;
    optional string log_type = 5;
    optional string environment = 6;
    optional string error_fingerprint = 7;
    repeated string status_class = 8;   // "2xx", "4xx", "5xx"
    optional string search = 9;         // substring match on method, path, message, or error_message
}

message LogFacetValue {
    string value = 1;
    int64 count = 2;
}

message GetLogFacetsResponse {
    int64 project_id = 1;
    repeated LogFacetValue level = 2;
    repeated LogFacetValue log_type = 3;
    repeated LogFacetValue status_class = 4;
    repeated LogFacetValue environment = 5;
}

message SearchLogsRequest {
    int64 project_id = 1;
    string query = 2;
    optional string start_time = 3;
    optional string end_time = 4;
    int32 limit = 5;
    int32 offset = 6;
}

message GetLogRequest {
    int64 log_id = 1;
    int64 project_id = 2;
}

message LogEntry {
    int64 id = 1;
    int64 project_id = 2;
    string timestamp = 3;
    string ingested_at = 4;
    string level = 5;
    string log_type = 6;
    string importance = 7;
    optional string environment = 8;
    optional string release = 9;
    optional string message = 10;
    optional string error_type = 11;
    optional string error_message = 12;
    optional string stack_trace = 13;
    optional string attributes = 14;
    optional string sdk_version = 15;
    optional string platform = 16;
    optional string platform_version = 17;
    optional int32 processing_time_ms = 18;
    optional string error_fingerprint = 19;
    optional string method = 20;
    optional string path = 21;
    optional int32 status_code = 22;
    optional int32 duration_ms = 23;
}

message QueryLogsResponse {
    repeated LogEntry logs = 1;
    int32 total = 2;
    bool has_more = 3;
    optional string next_cursor = 4;
}

message SearchLogsResponse {
    repeated LogEntry logs = 1;
    int32 total = 2;
    bool has_more = 3;
}

message GetLogResponse {
    optional LogEntry log = 1;
    bool found = 2;
}

message GetErrorRateRequest {
    int64 project_id = 1;
    optional string interval = 2;
    optional string start_time = 3;
    optional string end_time = 4;
}

message ErrorRateData {
    string timestamp = 1;
    int32 error_count = 2;
    int32 critical_count = 3;
}

message GetErrorRateResponse {
    int64 project_id = 1;
    string interval = 2;
    repeated ErrorRateData data = 3;
}

message GetLogVolumeRequest {
    int64 project_id = 1;
    optional string interval = 2;
    optional string start_time = 3;
    optional string end_time = 4;
}

message LogVolumeData {
    string timestamp = 1;
    int32 debug = 2;
    int32 info = 3;
    int32 warning = 4;
    int32 error = 5;
    int32 critical = 6;
}

message GetLogVolumeResponse {
    int64 project_id = 1;
    string interval = 2;
    repeated LogVolumeData data = 3;
}

message GetTopErrorsRequest {
    int64 project_id = 1;
    optional int32 limit = 2;
    optional string start_time = 3;
    optional string end_time = 4;
    optional string status = 5;
}

message TopErrorData {
    string fingerprint = 1;
    string error_type = 2;
    optional string error_message = 3;
    int32 occurrence_count = 4;
    string first_seen = 5;
    string last_seen = 6;
    string status = 7;
    optional int64 sample_log_id = 8;
}

message GetTopErrorsResponse {
    int64 project_id = 1;
    repeated TopErrorData errors = 2;
}

message GetUsageStatsRequest {
    int64 project_id = 1;
    optional string start_date = 2;
    optional string end_date = 3;
}

message UsageStatsData {
    string date = 1;
    int32 log_count = 2;
    int32 logs_daily_quota = 3;
    float logs_quota_used_percent = 4;
    int32 span_count = 5;
    int32 metric_point_count = 6;
    int32 spans_daily_quota = 7;
    int32 metrics_daily_quota = 8;
    float spans_quota_used_percent = 9;
    float metrics_quota_used_percent = 10;
}

message GetUsageStatsResponse {
    int64 project_id = 1;
    repeated UsageStatsData usage = 2;
}

message GetAggregatedMetricsRequest {
    int64 project_id = 1;
    string metric_type = 2;
    optional string period = 3;
    optional string period_from = 4;
    optional string period_to = 5;
    optional string endpoint_path = 6;
    optional string granularity = 7;
}

message AggregatedMetricData {
    string date = 1;
    optional int32 hour = 2;
    optional string endpoint_method = 3;
    optional string endpoint_path = 4;
    int32 log_count = 5;
    int32 error_count = 6;
    optional float avg_duration_ms = 7;
    optional int32 min_duration_ms = 8;
    optional int32 max_duration_ms = 9;
    optional int32 p95_duration_ms = 10;
    optional int32 p99_duration_ms = 11;
    optional string log_level = 12;
    optional string log_type = 13;
}

message GetAggregatedMetricsResponse {
    int64 project_id = 1;
    string metric_type = 2;
    string granularity = 3;
    string start_date = 4;
    string end_date = 5;
    repeated AggregatedMetricData data = 6;
}

message GetErrorListRequest {
    int64 project_id = 1;
    optional string period = 2;
    optional string period_from = 3;
    optional string period_to = 4;
    int32 limit = 5;
    int32 offset = 6;
    optional string search = 7;
}

message ErrorListEntry {
    int64 log_id = 1;
    int64 project_id = 2;
    string level = 3;
    string log_type = 4;
    string message = 5;
    optional string error_type = 6;
    string timestamp = 7;
    optional string error_fingerprint = 8;
    optional string attributes = 9;
    optional string sdk_version = 10;
    optional string platform = 11;
    optional string group_key = 12;
    int32 occurrence_count = 13;
    string first_seen = 14;
    string last_seen = 15;
    optional int32 status_code = 16;
    optional string path = 17;
    optional string stack_trace = 18;
    int64 latest_log_id = 19;
}

message GetErrorListResponse {
    int64 project_id = 1;
    repeated ErrorListEntry errors = 2;
    int32 total = 3;
    bool has_more = 4;
}

message GetBottleneckMetricsRequest {
    int64 project_id = 1;
    repeated string routes = 2;
    string statistic = 3;
    optional string period = 4;
    optional string period_from = 5;
    optional string period_to = 6;
    optional string granularity = 7;
}

message BottleneckMetricDataPoint {
    string date = 1;
    optional int32 hour = 2;
    string route = 3;
    double value = 4;
}

message GetBottleneckMetricsResponse {
    int64 project_id = 1;
    string statistic = 2;
    string granularity = 3;
    string start_date = 4;
    string end_date = 5;
    repeated BottleneckMetricDataPoint data = 6;
}

message GetBottleneckListRequest {
    int64 project_id = 1;
    string statistic = 2;
    string sort = 3;
    optional string period = 4;
    optional string period_from = 5;
    optional string period_to = 6;
    int32 limit = 7;
    int32 offset = 8;
    optional string search = 9;
}

message BottleneckListEntry {
    string route = 1;
    double value = 2;
    int64 request_count = 3;
    optional double min_value = 4;
    optional double max_value = 5;
    optional double avg_value = 6;
    optional double median_value = 7;
}

message GetBottleneckListResponse {
    int64 project_id = 1;
    string statistic = 2;
    string sort = 3;
    string start_date = 4;
    string end_date = 5;
    double max_value = 6;
    repeated BottleneckListEntry entries = 7;
    int64 total = 8;
    bool has_more = 9;
}

// ==================== Error Group Workflow Messages ====================

message ErrorGroupData {
    int64 id = 1;
    int64 project_id = 2;
    string fingerprint = 3;
    string error_type = 4;
    optional string error_message = 5;
    string first_seen = 6;
    string last_seen = 7;
    int64 occurrence_count = 8;
    string status = 9;
    optional int64 assigned_to = 10;
    optional int64 sample_log_id = 11;
    optional string resolved_at = 12;
    optional string resolved_in_release = 13;
}

message ListErrorGroupsRequest {
    int64 project_id = 1;
    optional string status = 2;
    int32 limit = 3;
    int32 offset = 4;
}

message ListErrorGroupsResponse {
    int64 project_id = 1;
    repeated ErrorGroupData groups = 2;
    int32 total = 3;
    bool has_more = 4;
}

message GetErrorGroupRequest {
    int64 project_id = 1;
    int64 group_id = 2;
}

message ErrorOccurrenceBucket {
    string bucket = 1;
    int64  count  = 2;
}

message GetErrorGroupResponse {
    optional ErrorGroupData group = 1;
    optional string sample_stack_trace = 2;
    optional LogEntry sample_log = 3;
    bool found = 4;
    repeated ErrorOccurrenceBucket occurrence_sparkline = 5;
}

message UpdateErrorGroupStatusRequest {
    int64 project_id = 1;
    int64 group_id = 2;
    string status = 3;
    optional string resolved_in_release = 4;
}

message UpdateErrorGroupStatusResponse {
    optional ErrorGroupData group = 1;
    bool found = 2;
}

message AssignErrorGroupRequest {
    int64 project_id = 1;
    int64 group_id = 2;
    optional int64 assigned_to = 3;
}

message AssignErrorGroupResponse {
    optional ErrorGroupData group = 1;
    bool found = 2;
}

message GetHealthSummaryRequest {
    repeated string project_ids = 1;
    optional string period = 2;
}

message HealthThresholds {
    double error_rate_warn = 1;
    double error_rate_crit = 2;
    int32 p95_warn_ms = 3;
    int32 p95_crit_ms = 4;
}

message HealthSummary {
    string project_id = 1;
    double error_rate = 2;
    double p95_ms = 3;
    double rps = 4;
    string status = 5;
    repeated int32 sparkline = 6;
    HealthThresholds thresholds = 7;
    string generated_at = 8;
}

message GetHealthSummaryResponse {
    repeated HealthSummary summaries = 1;
}

// ==================== Distributed Tracing Messages ====================

message SpanData {
    string span_id          = 1;
    string trace_id         = 2;
    string parent_span_id   = 3;
    int64  project_id       = 4;
    string service_name     = 5;
    string name             = 6;
    int32  kind             = 7;
    string start_time       = 8;
    int64  duration_ns      = 9;
    int32  status_code      = 10;
    string status_message   = 11;
    string attributes       = 12;  // JSON string
    string events           = 13;  // JSON string
    string error_fingerprint = 14;
}

message GetTraceRequest {
    string trace_id   = 1;
    int64  project_id = 2;
}

message GetTraceResponse {
    string trace_id      = 1;
    repeated SpanData spans = 2;
    int64  duration_ms   = 3;
    repeated string services = 4;
    string root_span_id  = 5;
    bool   found         = 6;
}

message ListTracesRequest {
    int64  project_id       = 1;
    optional string service = 2;
    optional string name    = 3;
    optional int64  min_duration_ms = 4;
    optional bool   has_error       = 5;
    optional string from_time       = 6;
    optional string to_time         = 7;
    int32  limit   = 8;
    int32  offset  = 9;
}

message TraceSummary {
    string trace_id      = 1;
    string root_span_id  = 2;
    string root_name     = 3;
    string service_name  = 4;
    string start_time    = 5;
    int64  duration_ms   = 6;
    int32  span_count    = 7;
    bool   has_error     = 8;
}

message ListTracesResponse {
    repeated TraceSummary traces = 1;
    int32 total   = 2;
    bool has_more = 3;
}

message GetSpanLatencyRequest {
    int64  project_id       = 1;
    optional string service = 2;
    optional string name    = 3;
    optional string from_time = 4;
    optional string to_time   = 5;
}

message SpanLatencyBucket {
    string service_name = 1;
    string name         = 2;
    string bucket       = 3;
    int64  calls        = 4;
    int64  p50_ns       = 5;
    int64  p95_ns       = 6;
    int64  p99_ns       = 7;
    int64  errors       = 8;
}

message GetSpanLatencyResponse {
    int64  project_id = 1;
    repeated SpanLatencyBucket data = 2;
}

// ==================== Metric Points Messages ====================

message GetMetricSeriesRequest {
    int64 project_id = 1;
}

message MetricSeriesInfo {
    string name       = 1;
    int32  type       = 2;
    repeated string tag_keys = 3;
}

message GetMetricSeriesResponse {
    int64 project_id = 1;
    repeated MetricSeriesInfo series = 2;
}

message QueryMetricsRequest {
    int64  project_id          = 1;
    string name                = 2;
    map<string, string> tags   = 3;
    string aggregation         = 4;  // avg|sum|min|max|count
    optional string from_time  = 5;
    optional string to_time    = 6;
}

message MetricDataPoint {
    string bucket = 1;
    double value  = 2;
}

message QueryMetricsResponse {
    int64  project_id  = 1;
    string name        = 2;
    string aggregation = 3;
    repeated MetricDataPoint data = 4;
}
