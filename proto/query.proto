syntax = "proto3";

package query;

service QueryService {
    rpc QueryLogs(QueryLogsRequest) returns (QueryLogsResponse);
    rpc SearchLogs(SearchLogsRequest) returns (SearchLogsResponse);
    rpc GetLog(GetLogRequest) returns (GetLogResponse);
    rpc GetErrorRate(GetErrorRateRequest) returns (GetErrorRateResponse);
    rpc GetLogVolume(GetLogVolumeRequest) returns (GetLogVolumeResponse);
    rpc GetTopErrors(GetTopErrorsRequest) returns (GetTopErrorsResponse);
    rpc GetUsageStats(GetUsageStatsRequest) returns (GetUsageStatsResponse);
    rpc GetAggregatedMetrics(GetAggregatedMetricsRequest) returns (GetAggregatedMetricsResponse);
    rpc GetErrorList(GetErrorListRequest) returns (GetErrorListResponse);
    rpc GetBottleneckMetrics(GetBottleneckMetricsRequest) returns (GetBottleneckMetricsResponse);
    rpc GetHealthSummary(GetHealthSummaryRequest) returns (GetHealthSummaryResponse);

    // Distributed tracing
    rpc GetTrace(GetTraceRequest) returns (GetTraceResponse);
    rpc ListTraces(ListTracesRequest) returns (ListTracesResponse);
    rpc GetSpanLatency(GetSpanLatencyRequest) returns (GetSpanLatencyResponse);

    // Custom metrics
    rpc QueryCustomMetrics(QueryCustomMetricsRequest) returns (QueryCustomMetricsResponse);
    rpc ListCustomMetricNames(ListCustomMetricNamesRequest) returns (ListCustomMetricNamesResponse);
    rpc ListCustomMetricTags(ListCustomMetricTagsRequest) returns (ListCustomMetricTagsResponse);
}

message QueryLogsRequest {
    int64 project_id = 1;
    optional string start_time = 2;
    optional string end_time = 3;
    optional string level = 4;
    optional string log_type = 5;
    optional string environment = 6;
    optional string error_fingerprint = 7;
    int32 limit = 8;
    int32 offset = 9;
    repeated string status_class = 10;  // "2xx", "4xx", "5xx"
    optional string search = 11;        // substring match on method or path
}

message SearchLogsRequest {
    int64 project_id = 1;
    string query = 2;
    optional string start_time = 3;
    optional string end_time = 4;
    int32 limit = 5;
    int32 offset = 6;
}

message GetLogRequest {
    int64 log_id = 1;
    int64 project_id = 2;
}

message LogEntry {
    int64 id = 1;
    int64 project_id = 2;
    string timestamp = 3;
    string ingested_at = 4;
    string level = 5;
    string log_type = 6;
    string importance = 7;
    optional string environment = 8;
    optional string release = 9;
    optional string message = 10;
    optional string error_type = 11;
    optional string error_message = 12;
    optional string stack_trace = 13;
    optional string attributes = 14;
    optional string sdk_version = 15;
    optional string platform = 16;
    optional string platform_version = 17;
    optional int32 processing_time_ms = 18;
    optional string error_fingerprint = 19;
    optional string method = 20;
    optional string path = 21;
    optional int32 status_code = 22;
    optional int32 duration_ms = 23;
}

message QueryLogsResponse {
    repeated LogEntry logs = 1;
    int32 total = 2;
    bool has_more = 3;
}

message SearchLogsResponse {
    repeated LogEntry logs = 1;
    int32 total = 2;
    bool has_more = 3;
}

message GetLogResponse {
    optional LogEntry log = 1;
    bool found = 2;
}

message GetErrorRateRequest {
    int64 project_id = 1;
    optional string interval = 2;
    optional string start_time = 3;
    optional string end_time = 4;
}

message ErrorRateData {
    string timestamp = 1;
    int32 error_count = 2;
    int32 critical_count = 3;
}

message GetErrorRateResponse {
    int64 project_id = 1;
    string interval = 2;
    repeated ErrorRateData data = 3;
}

message GetLogVolumeRequest {
    int64 project_id = 1;
    optional string interval = 2;
    optional string start_time = 3;
    optional string end_time = 4;
}

message LogVolumeData {
    string timestamp = 1;
    int32 debug = 2;
    int32 info = 3;
    int32 warning = 4;
    int32 error = 5;
    int32 critical = 6;
}

message GetLogVolumeResponse {
    int64 project_id = 1;
    string interval = 2;
    repeated LogVolumeData data = 3;
}

message GetTopErrorsRequest {
    int64 project_id = 1;
    optional int32 limit = 2;
    optional string start_time = 3;
    optional string end_time = 4;
    optional string status = 5;
}

message TopErrorData {
    string fingerprint = 1;
    string error_type = 2;
    optional string error_message = 3;
    int32 occurrence_count = 4;
    string first_seen = 5;
    string last_seen = 6;
    string status = 7;
    optional int64 sample_log_id = 8;
}

message GetTopErrorsResponse {
    int64 project_id = 1;
    repeated TopErrorData errors = 2;
}

message GetUsageStatsRequest {
    int64 project_id = 1;
    optional string start_date = 2;
    optional string end_date = 3;
}

message UsageStatsData {
    string date = 1;
    int32 log_count = 2;
    int32 daily_quota = 3;
    float quota_used_percent = 4;
}

message GetUsageStatsResponse {
    int64 project_id = 1;
    repeated UsageStatsData usage = 2;
}

message GetAggregatedMetricsRequest {
    int64 project_id = 1;
    string metric_type = 2;
    optional string period = 3;
    optional string period_from = 4;
    optional string period_to = 5;
    optional string endpoint_path = 6;
    optional string granularity = 7;
}

message AggregatedMetricData {
    string date = 1;
    optional int32 hour = 2;
    optional string endpoint_method = 3;
    optional string endpoint_path = 4;
    int32 log_count = 5;
    int32 error_count = 6;
    optional float avg_duration_ms = 7;
    optional int32 min_duration_ms = 8;
    optional int32 max_duration_ms = 9;
    optional int32 p95_duration_ms = 10;
    optional int32 p99_duration_ms = 11;
    optional string log_level = 12;
    optional string log_type = 13;
}

message GetAggregatedMetricsResponse {
    int64 project_id = 1;
    string metric_type = 2;
    string granularity = 3;
    string start_date = 4;
    string end_date = 5;
    repeated AggregatedMetricData data = 6;
}

message GetErrorListRequest {
    int64 project_id = 1;
    optional string period = 2;
    optional string period_from = 3;
    optional string period_to = 4;
    int32 limit = 5;
    int32 offset = 6;
    optional string search = 7;
}

message ErrorListEntry {
    int64 log_id = 1;
    int64 project_id = 2;
    string level = 3;
    string log_type = 4;
    string message = 5;
    optional string error_type = 6;
    string timestamp = 7;
    optional string error_fingerprint = 8;
    optional string attributes = 9;
    optional string sdk_version = 10;
    optional string platform = 11;
    optional string group_key = 12;
    int32 occurrence_count = 13;
    string first_seen = 14;
    string last_seen = 15;
    optional int32 status_code = 16;
    optional string path = 17;
    optional string stack_trace = 18;
    int64 latest_log_id = 19;
}

message GetErrorListResponse {
    int64 project_id = 1;
    repeated ErrorListEntry errors = 2;
    int32 total = 3;
    bool has_more = 4;
}

message GetBottleneckMetricsRequest {
    int64 project_id = 1;
    repeated string routes = 2;
    string statistic = 3;
    optional string period = 4;
    optional string period_from = 5;
    optional string period_to = 6;
    optional string granularity = 7;
}

message BottleneckMetricDataPoint {
    string date = 1;
    optional int32 hour = 2;
    string route = 3;
    double value = 4;
}

message GetBottleneckMetricsResponse {
    int64 project_id = 1;
    string statistic = 2;
    string granularity = 3;
    string start_date = 4;
    string end_date = 5;
    repeated BottleneckMetricDataPoint data = 6;
}

message GetHealthSummaryRequest {
    repeated string project_ids = 1;
    optional string period = 2;
}

message HealthThresholds {
    double error_rate_warn = 1;
    double error_rate_crit = 2;
    int32 p95_warn_ms = 3;
    int32 p95_crit_ms = 4;
}

message HealthSummary {
    string project_id = 1;
    double error_rate = 2;
    double p95_ms = 3;
    double rps = 4;
    string status = 5;
    repeated int32 sparkline = 6;
    HealthThresholds thresholds = 7;
    string generated_at = 8;
}

message GetHealthSummaryResponse {
    repeated HealthSummary summaries = 1;
}

// ==================== Distributed Tracing Messages ====================

message SpanData {
    string span_id          = 1;
    string trace_id         = 2;
    string parent_span_id   = 3;
    int64  project_id       = 4;
    string service_name     = 5;
    string name             = 6;
    int32  kind             = 7;
    string start_time       = 8;
    int64  duration_ns      = 9;
    int32  status_code      = 10;
    string status_message   = 11;
    string attributes       = 12;  // JSON string
    string events           = 13;  // JSON string
    string error_fingerprint = 14;
}

message GetTraceRequest {
    string trace_id   = 1;
    int64  project_id = 2;
}

message GetTraceResponse {
    string trace_id      = 1;
    repeated SpanData spans = 2;
    int64  duration_ms   = 3;
    repeated string services = 4;
    string root_span_id  = 5;
    bool   found         = 6;
}

message ListTracesRequest {
    int64  project_id       = 1;
    optional string service = 2;
    optional string name    = 3;
    optional int64  min_duration_ms = 4;
    optional bool   has_error       = 5;
    optional string from_time       = 6;
    optional string to_time         = 7;
    int32  limit   = 8;
    int32  offset  = 9;
}

message TraceSummary {
    string trace_id      = 1;
    string root_span_id  = 2;
    string root_name     = 3;
    string service_name  = 4;
    string start_time    = 5;
    int64  duration_ms   = 6;
    int32  span_count    = 7;
    bool   has_error     = 8;
}

message ListTracesResponse {
    repeated TraceSummary traces = 1;
    int32 total   = 2;
    bool has_more = 3;
}

message GetSpanLatencyRequest {
    int64  project_id       = 1;
    optional string service = 2;
    optional string name    = 3;
    optional string from_time = 4;
    optional string to_time   = 5;
}

message SpanLatencyBucket {
    string service_name = 1;
    string name         = 2;
    string bucket       = 3;
    int64  calls        = 4;
    int64  p50_ns       = 5;
    int64  p95_ns       = 6;
    int64  p99_ns       = 7;
    int64  errors       = 8;
}

message GetSpanLatencyResponse {
    int64  project_id = 1;
    repeated SpanLatencyBucket data = 2;
}

// ==================== Custom Metrics Messages ====================

message QueryCustomMetricsRequest {
    int64  project_id  = 1;
    string name        = 2;
    string tags        = 3;  // JSON string filter
    optional string from_time = 4;
    optional string to_time   = 5;
    optional string agg       = 6;  // sum|avg|rate|p95
    optional int32  step_seconds = 7;
}

message CustomMetricDataPoint {
    string bucket = 1;
    double value  = 2;
}

message QueryCustomMetricsResponse {
    int64  project_id = 1;
    string name       = 2;
    string agg        = 3;
    repeated CustomMetricDataPoint data = 4;
}

message ListCustomMetricNamesRequest {
    int64  project_id = 1;
    optional string prefix = 2;
}

message ListCustomMetricNamesResponse {
    repeated string names = 1;
}

message ListCustomMetricTagsRequest {
    int64  project_id = 1;
    string name       = 2;
}

message CustomMetricTagEntry {
    string key            = 1;
    repeated string values = 2;
}

message ListCustomMetricTagsResponse {
    repeated CustomMetricTagEntry tags = 1;
}
