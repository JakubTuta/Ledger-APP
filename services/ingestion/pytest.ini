[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    asyncio: mark test as async
    load: wall-clock throughput/stress test (excludable with -m "not load"); also auto-skips when CI env var is set
